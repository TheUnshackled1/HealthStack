{% load static %}

{% for message in messages %}
  <div id="alert-message-{{ forloop.counter }}" class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{message.tags}}{% endif %} alert-dismissible fade show" role="alert" style="position: fixed; top: 80px; right: 20px; z-index: 9999; min-width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    {% if message.tags == 'error' %}
      <i class="fas fa-times-circle mr-2"></i>
    {% elif message.tags == 'warning' %}
      <i class="fas fa-exclamation-triangle mr-2"></i>
    {% elif message.tags == 'info' %}
      <i class="fas fa-info-circle mr-2"></i>
    {% elif message.tags == 'success' %}
      <i class="fas fa-check-circle mr-2"></i>
    {% endif %}
    {{message|safe}}
    <button type="button" class="btn-close" onclick="this.parentElement.style.display='none';" aria-label="Close"></button>
  </div>
{% endfor %}
